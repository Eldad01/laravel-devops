name: Laravel CI/CD

on:
  push:
    branches:
      - main

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4

      - name: Copy .env
        run: cp .env.example .env

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Generate key
        run: php artisan key:generate

      - name: Configure SQLite
        run: |
          touch database/database.sqlite
          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env

      - name: Run migrations
        run: php artisan migrate

      - name: Run tests
        run: php artisan test

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/laravel-app:${{ github.sha }} .

  push:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/laravel-app:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/laravel-app:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/laravel-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/laravel-app:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/laravel-app:latest

  deploy:
    needs: push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/laravel-app:latest
            docker stop laravel-app || true
            docker rm laravel-app || true
            docker run -d -p 80:8000 --name laravel-app ${{ secrets.DOCKER_USERNAME }}/laravel-app:latest



